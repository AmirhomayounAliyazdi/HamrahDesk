name: Build HamrahDesk Android

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FLUTTER_VERSION: "3.19.6"
  RUST_VERSION: "stable" 
  # آدرس دقیق NDK پایدار برای این پروژه
  ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653
  VCPKG_ROOT: /home/runner/vcpkg

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout HamrahDesk
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # دریافت کامل تاریخچه برای جلوگیری از ارور گیت

      - name: Clean and Fix Manifest
        run: |
          rm -f rust-toolchain rust-toolchain.toml
          # پاک کردن Baseline از فایل vcpkg.json برای جلوگیری از ارور versions/baseline.json
          if [ -f "vcpkg.json" ]; then
            sed -i '/"builtin-baseline":/d' vcpkg.json
          fi
          if [ -f "flutter/vcpkg.json" ]; then
            sed -i '/"builtin-baseline":/d' flutter/vcpkg.json
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake nasm yasm meson
          # نصب مستقیم کدژن و ndk-cargo
          cargo install cargo-ndk --version 3.5.4 --locked
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          cd $VCPKG_ROOT
          ./bootstrap-vcpkg.sh -disableMetrics

      - name: Build C++ Dependencies
        env:
          ANDROID_NDK: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          VCPKG_FORCE_SYSTEM_BINARIES: "1"
        run: |
          cd flutter
          chmod +x build_android_deps.sh
          
          # اطمینان از اینکه CMake مسیر نینجا را می‌شناسد
          export CMAKE_MAKE_PROGRAM=$(which ninja)
          
          # اجرای بیلد و نمایش لاگ در صورت شکست
          if ! ./build_android_deps.sh armeabi-v7a; then
            echo "--- ERROR DETECTED ---"
            find $VCPKG_ROOT/buildtrees -name "*.log" -exec cat {} \;
            exit 1
          fi
          ./build_android_deps.sh arm64-v8a

      - name: Generate Bridge
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output ./lib/generated_bridge.dart --class-name HamrahDesk

      - name: Build Rust Backend
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          cargo ndk -t armeabi-v7a -t arm64-v8a build --release --features flutter

      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HamrahDesk-Android
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
