name: Build HamrahDesk Android

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FLUTTER_VERSION: "3.19.6"
  RUST_VERSION: "stable" 
  # وادار کردن سیستم به استفاده از گره‌های پایدار
  VCPKG_ROOT: /home/runner/vcpkg
  VCPKG_FORCE_SYSTEM_BINARIES: "1"

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout HamrahDesk
        uses: actions/checkout@v4

      - name: Clean Start
        run: |
          rm -f rust-toolchain rust-toolchain.toml
          sudo rm -rf /home/runner/vcpkg

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake nasm yasm meson
          # اطمینان از اینکه نینجا در همه جا در دسترس است
          sudo ln -sf /usr/bin/ninja /usr/bin/make

      - name: Setup Tools via Cargo
        run: |
          cargo install cargo-ndk --version 3.5.4 --locked
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked

      - name: Clone vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          $VCPKG_ROOT/bootstrap-vcpkg.sh

      - name: Fix NDK Path & Build C++
        run: |
          cd flutter
          chmod +x build_android_deps.sh
          
          # پیدا کردن نشانی واقعی NDK در سرور گیت‌هاب
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
            export ANDROID_NDK_HOME=$(ls -d $ANDROID_SDK_ROOT/ndk/* | head -1)
          fi
          export ANDROID_NDK=$ANDROID_NDK_HOME
          
          echo "Using NDK at: $ANDROID_NDK_HOME"
          
          # اجرای بیلد با تزریق مستقیم متغیرهای پیرامونی
          # ما مسیر نینجا را مستقیما به اسکریپت می‌دهیم
          export CMAKE_MAKE_PROGRAM=$(which ninja)
          
          if ! ./build_android_deps.sh armeabi-v7a; then
            echo "--- ERROR LOGS ---"
            find $VCPKG_ROOT/buildtrees -name "*.log" -exec cat {} \;
            exit 1
          fi
          ./build_android_deps.sh arm64-v8a
          ./build_android_deps.sh x86
          ./build_android_deps.sh x86_64

      - name: Generate Bridge
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output ./lib/generated_bridge.dart --class-name HamrahDesk

      - name: Build Rust Backend
        run: |
          # استفاده از نشانی یافته شده برای NDK
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
            export ANDROID_NDK_HOME=$(ls -d $ANDROID_SDK_ROOT/ndk/* | head -1)
          fi
          cargo ndk -t armeabi-v7a -t arm64-v8a build --release --features flutter

      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HamrahDesk-Android
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
