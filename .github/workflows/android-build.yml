name: Build HamrahDesk Android

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FLUTTER_VERSION: "3.19.6"
  RUST_VERSION: "1.75.0"
  NDK_VERSION: "27.3.13750724" # نسخه NDK با سرور گیت‌هاب هماهنگ شد

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android
          components: "rustfmt"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.4 --locked

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked

      - name: Generate Rust Bridge
        run: |
          cd flutter
          flutter pub get
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output ./lib/generated_bridge.dart --class-name HamrahDesk

      - name: Install vcpkg (From Source)
        run: |
          git clone https://github.com/microsoft/vcpkg.git $HOME/vcpkg
          cd $HOME/vcpkg
          git checkout 1de2026f28ead93ff1773e6e680387643e914ea1
          ./bootstrap-vcpkg.sh -disableMetrics

      - name: Build Rust Backend (so libraries)
        env:
          VCPKG_ROOT: /home/runner/vcpkg
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
        run: |
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86 -t x86_64 -o flutter/android/app/src/main/jniLibs build --release

      - name: Build Flutter Android APK
        run: |
          cd flutter
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HamrahDesk-Android-APK
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
