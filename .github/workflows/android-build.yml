name: Build HamrahDesk Android

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FLUTTER_VERSION: "3.19.6"
  RUST_VERSION: "1.75.0"
  NDK_VERSION: "27.3.13750724"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  
  # خواندن امن اطلاعات سرور از بخش Secrets گیت‌هاب
  RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
  RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android
          components: "rustfmt"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.4 --locked

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked

      - name: Generate Rust Bridge
        run: |
          cd flutter
          flutter pub get
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output ./lib/generated_bridge.dart --class-name HamrahDesk

      - name: Install C/C++ Cross-Compilation Headers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib

      - name: Get pre-compiled C++ Dependencies (vcpkg)
        run: |
          cd /opt
          sudo git clone https://github.com/Kingtous/rustdesk_thirdparty_lib.git --depth=1

      - name: Download RustDesk JNI Libraries (oboe & ndk_compat)
        run: |
          cd $GITHUB_WORKSPACE
          URLS=(
            "https://github.com/rustdesk-org/doc.rustdesk.com/releases/download/console/so.tar.gz"
            "https://gitee.com/rustdesk/doc.rustdesk.com/releases/download/console/so.tar.gz"
            "https://web.archive.org/web/20231024103126id_/https://github.com/rustdesk/doc.rustdesk.com/releases/download/console/so.tar.gz"
          )
          SUCCESS=false
          for url in "${URLS[@]}"; do
            echo "Trying to download from: $url"
            if curl -sL -f -o so.tar.gz "$url"; then
              echo "✅ Successfully downloaded!"
              tar xzf so.tar.gz
              rm so.tar.gz
              SUCCESS=true
              break
            fi
          done
          if [ "$SUCCESS" = false ]; then
            echo "❌ All download attempts failed!"
            exit 1
          fi

      - name: Build Rust Backend (so libraries)
        env:
          VCPKG_ROOT: /opt/rustdesk_thirdparty_lib/vcpkg
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
        run: |
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86 -t x86_64 -o flutter/android/app/src/main/jniLibs build --release --features flutter

      - name: Build Flutter Android APK
        run: |
          cd flutter
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HamrahDesk-Android-APK
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
