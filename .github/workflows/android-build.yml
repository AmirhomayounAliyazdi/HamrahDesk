name: Build HamrahDesk Android

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FLUTTER_VERSION: "3.19.6"
  RUST_VERSION: "stable" 
  VCPKG_ROOT: /home/runner/vcpkg

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout HamrahDesk
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # دریافت کامل تاریخچه برای جلوگیری از ارور Git 128

      - name: Clean Environment
        run: |
          rm -f rust-toolchain rust-toolchain.toml
          sudo rm -rf $VCPKG_ROOT

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust & Targets
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake nasm yasm meson pkg-config
          # اطمینان از وجود نینجا در مسیرهای استاندارد
          sudo ln -sf /usr/bin/ninja /usr/bin/make

      - name: Install Rust Tools
        run: |
          cargo install cargo-ndk --version 3.5.4 --locked
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          $VCPKG_ROOT/bootstrap-vcpkg.sh -disableMetrics

      - name: Build C++ Dependencies (With Auto NDK & Ninja)
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: "1"
        run: |
          cd flutter
          chmod +x build_android_deps.sh
          
          # پیدا کردن آدرس واقعی NDK روی سرور گیت‌هاب به صورت خودکار
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
             # اگر مسیر باندل نبود، آخرین نسخه نصب شده در پوشه ndk را بردار
             export ANDROID_NDK_HOME=$(ls -d $ANDROID_SDK_ROOT/ndk/* | head -1)
          fi
          export ANDROID_NDK=$ANDROID_NDK_HOME
          echo "NDK Found at: $ANDROID_NDK"
          
          # تزریق مستقیم مسیر Ninja برای رفع ارور CMAKE_MAKE_PROGRAM is not set
          export CMAKE_MAKE_PROGRAM=$(which ninja)
          
          # تلاش برای بیلد معماری اصلی
          if ! ./build_android_deps.sh armeabi-v7a; then
            echo "--------------------------------------------------------"
            echo "!!! CRITICAL FAILURE - PRINTING ALL LOGS !!!"
            echo "--------------------------------------------------------"
            # چاپ لاگ‌های دقیق در صورت شکست [cite: 2, 3]
            find $VCPKG_ROOT/buildtrees -name "*.log" -exec echo "--- LOG FILE: {} ---" \; -exec cat {} \;
            exit 1
          fi
          
          # بیلد سایر معماری‌ها
          ./build_android_deps.sh arm64-v8a

      - name: Generate Rust Bridge
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output ./lib/generated_bridge.dart --class-name HamrahDesk

      - name: Build Rust Backend
        run: |
          # استفاده از همان NDK پیدا شده در مرحله قبل
          export ANDROID_NDK_HOME=$(ls -d $ANDROID_SDK_ROOT/ndk/* | head -1)
          cargo ndk -t armeabi-v7a -t arm64-v8a build --release --features flutter

      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HamrahDesk-Android-APK
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
