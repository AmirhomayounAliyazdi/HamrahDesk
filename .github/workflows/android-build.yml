name: Build HamrahDesk Android

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths-ignore:
      - ".github/workflows/ci.yml"
      - ".github/workflows/flutter-build.yml"
      - ".github/workflows/flutter-ci.yml"
      - "docs/**"
      - "README.md"
      - "res/**"

env:
  FLUTTER_VERSION: "3.19.6"
  RUST_VERSION: "stable" 
  VCPKG_ROOT: /home/runner/vcpkg
  # شناسه‌ی دقیقِ هماهنگ با vcpkg.json شما
  VCPKG_COMMIT_ID: "f7423ee180c4b7f40d43402c2feb3859161ef625"

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout mahandesk
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean Environment
        run: |
          rm -f rust-toolchain rust-toolchain.toml

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true 

      - name: Install Rust & Targets
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake nasm yasm meson pkg-config gcc-multilib g++-multilib

      - name: Install Rust Tools
        run: |
          cargo install cargo-ndk --version 3.5.4 --locked
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}
          # تغییر نام نهانگاه به v3 برای دور ریختن فایل‌های خراب پیشین
          key: vcpkg-android-v3-${{ runner.os }}-${{ hashFiles('flutter/build_android_deps.sh') }}
          restore-keys: |
            vcpkg-android-v3-${{ runner.os }}-

      - name: Setup vcpkg (if not cached)
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
            cd $VCPKG_ROOT
            git checkout ${{ env.VCPKG_COMMIT_ID }}
            ./bootstrap-vcpkg.sh -disableMetrics
          else
            echo "vcpkg is cached, skipping clone."
          fi

      - name: Build C++ Dependencies
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: "1"
        run: |
          cd flutter
          chmod +x build_android_deps.sh
          
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
              export ANDROID_NDK_HOME=$(ls -d $ANDROID_SDK_ROOT/ndk/* | head -1)
          fi
          export ANDROID_NDK=$ANDROID_NDK_HOME
          echo "NDK Found at: $ANDROID_NDK"
          
          export CMAKE_MAKE_PROGRAM=$(which ninja)
          
          echo "Building armeabi-v7a..."
          ./build_android_deps.sh armeabi-v7a
          
          echo "Building arm64-v8a..."
          ./build_android_deps.sh arm64-v8a

          echo "Building x86_64 for Emulators..."
          ./build_android_deps.sh x86_64

      - name: Generate Rust Bridge
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output ./lib/generated_bridge.dart --class-name HamrahDesk

      - name: Build Rust Backend (librustdesk.so)
        run: |
          export ANDROID_NDK_HOME=$(ls -d $ANDROID_SDK_ROOT/ndk/* | head -1)
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86_64 -t x86 -o ./flutter/android/app/src/main/jniLibs build --release --features flutter

      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: mahandesk-Android-APKs
          path: flutter/build/app/outputs/flutter-apk/app-*.apk

