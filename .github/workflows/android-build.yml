name: Build HamrahDesk Android

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FLUTTER_VERSION: "3.19.6"
  RUST_VERSION: "stable" 
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NDK_VERSION: "25.2.9519653"
  ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653
  
  # دادن آدرس روت VCPKG به اسکریپت بیلد
  VCPKG_ROOT: /home/runner/vcpkg
  
  # این همان متغیری است که مقداردهی نشده بود و باعث ارور پایتون می‌شد
  VCPKG_FORCE_SYSTEM_BINARIES: "1"
  VCPKG_KEEP_ENV_VARS: "ANDROID_NDK_HOME;PATH;VCPKG_FORCE_SYSTEM_BINARIES"
  
  RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
  RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.4 --locked

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked

      - name: Generate Rust Bridge
        run: |
          cd flutter
          flutter pub get
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output ./lib/generated_bridge.dart --class-name HamrahDesk

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib ninja-build cmake pkg-config nasm yasm meson python3 python3-pip

      - name: Cache vcpkg Binary Archives
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/vcpkg/archives
          key: vcpkg-android-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            vcpkg-android-cache-${{ runner.os }}-

      - name: Clone and Setup vcpkg (To Specific Project Commit)
        run: |
          git clone https://github.com/microsoft/vcpkg.git /home/runner/vcpkg
          cd /home/runner/vcpkg
          # رفتن به همان کامیتی که سایر کتابخانه‌ها با آن سازگارند
          git checkout 1de2026f28ead93ff1773e6e680387643e914ea1
          ./bootstrap-vcpkg.sh -disableMetrics

      - name: Compile C++ Dependencies for Android (using native script)
        run: |
          cd flutter
          chmod +x build_android_deps.sh
          # بیلد معماری‌ها توسط اسکریپت اصلی پروژه
          ./build_android_deps.sh armeabi-v7a
          ./build_android_deps.sh arm64-v8a
          ./build_android_deps.sh x86
          ./build_android_deps.sh x86_64

      - name: Build Rust Backend (so libraries)
        run: |
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86 -t x86_64 -o flutter/android/app/src/main/jniLibs build --release --features flutter

      - name: Build Flutter Android APK
        run: |
          cd flutter
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HamrahDesk-Android-APK
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
