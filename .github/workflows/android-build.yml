name: Build HamrahDesk Android

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FLUTTER_VERSION: "3.19.6"
  RUST_VERSION: "stable" 
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NDK_VERSION: "25.2.9519653"
  
  # تعیین مسیرهای NDK
  ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653
  ANDROID_NDK: /usr/local/lib/android/sdk/ndk/25.2.9519653
  
  VCPKG_ROOT: /home/runner/vcpkg
  
  # راه حل طلایی: اجبار vcpkg به استفاده از ابزارهای سیستم و نادیده نگرفتن مسیرها
  VCPKG_FORCE_SYSTEM_BINARIES: "1"
  VCPKG_KEEP_ENV_VARS: "ANDROID_NDK_HOME;ANDROID_NDK;PATH;VCPKG_ROOT;VCPKG_FORCE_SYSTEM_BINARIES"
  
  RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
  RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Remove hardcoded rust-toolchain
        run: rm -f rust-toolchain rust-toolchain.toml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Install Tools via Cargo
        uses: cargo-bins/cargo-binstall@main

      - name: Binstall Dependencies
        run: |
          cargo binstall cargo-ndk --version 3.5.4 -y
          cargo binstall flutter_rust_bridge_codegen --version 1.80.1 -y

      - name: Generate Rust Bridge
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output ./lib/generated_bridge.dart --class-name HamrahDesk

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib ninja-build cmake pkg-config nasm yasm meson python3 python3-pip

      - name: Clone and Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git /home/runner/vcpkg
          cd /home/runner/vcpkg
          # استفاده از یک نسخه پایدارتر که با CMake جدید سازگار است
          git checkout 2024.04.26
          ./bootstrap-vcpkg.sh -disableMetrics

      - name: Compile C++ Dependencies for Android
        run: |
          cd flutter
          chmod +x build_android_deps.sh
          # اجرای اسکریپت با تزریق مستقیم مسیر NDK برای اطمینان صددرصدی
          export ANDROID_NDK_HOME=$ANDROID_NDK
          ./build_android_deps.sh armeabi-v7a
          ./build_android_deps.sh arm64-v8a
          ./build_android_deps.sh x86
          ./build_android_deps.sh x86_64

      - name: Build Rust Backend
        run: |
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86 -t x86_64 -o flutter/android/app/src/main/jniLibs build --release --features flutter

      - name: Build Flutter Android APK
        run: |
          cd flutter
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HamrahDesk-Android-APK
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
