name: Build HamrahDesk Android

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FLUTTER_VERSION: "3.19.6"
  RUST_VERSION: "stable" 
  NDK_VERSION: "25.2.9519653"
  ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653
  VCPKG_ROOT: /home/runner/vcpkg

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout HamrahDesk
        uses: actions/checkout@v4

      - name: Clean environment
        run: |
          rm -f rust-toolchain rust-toolchain.toml
          sudo rm -rf /home/runner/vcpkg

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install Build Tools
        run: |
          cargo install cargo-ndk --version 3.5.4 --locked
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake nasm yasm meson

      - name: Clone vcpkg (Full History to fix Git 128)
        run: |
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          $VCPKG_ROOT/bootstrap-vcpkg.sh

      - name: Build C++ Dependencies (With Full Error Logging)
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: "1"
          ANDROID_NDK: ${{ env.ANDROID_NDK_HOME }}
        run: |
          cd flutter
          chmod +x build_android_deps.sh
          # تلاش برای بیلد و در صورت شکست، چاپ تمام لاگ‌ها
          if ! ./build_android_deps.sh armeabi-v7a; then
            echo "--------------------------------------------------------"
            echo "!!! BUILD FAILED - PRINTING FULL ERROR LOGS BELOW !!!"
            echo "--------------------------------------------------------"
            find /home/runner/vcpkg/buildtrees -name "*.log" -exec echo "FILE: {}" \; -exec cat {} \;
            exit 1
          fi
          ./build_android_deps.sh arm64-v8a
          ./build_android_deps.sh x86
          ./build_android_deps.sh x86_64

      - name: Generate Bridge
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output ./lib/generated_bridge.dart --class-name HamrahDesk

      - name: Build Rust & APK
        run: |
          cargo ndk -t armeabi-v7a -t arm64-v8a -o flutter/android/app/src/main/jniLibs build --release --features flutter
          cd flutter
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HamrahDesk-APK
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
